<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>SatsCode — Bitcoin Builders Guild</title>
    <meta name="description" content="A decentralized guild for Bitcoin and Nostr builders. Post bounties, ship in public, earn sats." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="theme-color" content="#0D0B06" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SatsCode" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SatsCode — Bitcoin Builders Guild" />
    <meta property="og:description" content="A decentralized guild for Bitcoin and Nostr builders. Post bounties, ship in public, earn sats." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://satscode.vercel.app" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SatsCode — Bitcoin Builders Guild" />
    <meta name="twitter:description" content="A decentralized guild for Bitcoin and Nostr builders." />
    <meta name="twitter:image" content="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
  </body>
</html>
